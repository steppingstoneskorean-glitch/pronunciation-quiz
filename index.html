<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한국어 듣기 퀴즈 게임 (K-Listen Master)</title>
    <!-- 폭죽 효과를 위한 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --app-bg: rgba(255, 255, 255, 0.25);
            --app-border: rgba(255, 255, 255, 0.4);
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4a90e2;
            --success: #48bb78;
            --danger: #f56565;
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-gradient); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-main); padding: 20px; }

        .phone-container {
            width: 100%; max-width: 420px; height: 820px; background: var(--app-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--app-border); border-radius: 32px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 30px 24px; display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease, transform 0.4s ease; transform: scale(0.98);
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: 10; }

        h1 { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 8px; background: linear-gradient(45deg, #4a90e2, #9b5de5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 30px; }
        .glass-card { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; padding: 20px; margin-bottom: 20px; }

        .input-group { margin-bottom: 24px; }
        .input-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.5); border-radius: 14px; font-size: 16px; outline: none; transition: all 0.3s; }
        .input-group input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.8); }

        .customizer-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
        .option-row { display: flex; gap: 10px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
        .option-btn { padding: 10px 16px; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 12px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .option-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 700; }

        /* 캐릭터 CSS */
        .avatar-preview-box { display: flex; justify-content: center; align-items: center; height: 160px; margin-bottom: 24px; position: relative; }
        .character-avatar { width: 100px; height: 130px; position: relative; }
        .char-head { width: 60px; height: 60px; border-radius: 50%; background: #fcd34d; position: absolute; top: 10px; left: 20px; z-index: 3; transition: all 0.3s; }
        .char-head.hair-1::before { content: ''; position: absolute; top: -5px; left: -5px; width: 70px; height: 30px; background: #1a202c; border-radius: 40px 40px 0 0; }
        .char-head.hair-2::before { content: ''; position: absolute; top: -8px; left: 10px; width: 40px; height: 40px; background: #d69e2e; border-radius: 50%; box-shadow: -15px 5px 0 #d69e2e, 15px 5px 0 #d69e2e; }
        .char-head.hair-3::before { content: ''; position: absolute; top: -5px; left: 5px; width: 50px; height: 25px; background: #e53e3e; border-radius: 20px 20px 0 0; }
        .char-glasses { display: none; position: absolute; top: 25px; left: 5px; width: 50px; height: 20px; z-index: 5; }
        .char-glasses.glasses-round { display: flex; gap: 4px; }
        .char-glasses.glasses-round::before, .char-glasses.glasses-round::after { content: ''; width: 22px; height: 22px; border: 2.5px solid #2d3748; border-radius: 50%; display: block; }
        .char-glasses.glasses-square { display: flex; gap: 4px; }
        .char-glasses.glasses-square::before, .char-glasses.glasses-square::after { content: ''; width: 22px; height: 18px; border: 2.5px solid #2d3748; border-radius: 4px; display: block; }
        .char-face { position: absolute; top: 30px; left: 15px; width: 30px; height: 15px; display: flex; justify-content: space-between; z-index: 4; }
        .char-eye { width: 6px; height: 6px; background: #2d3748; border-radius: 50%; transition: all 0.2s; }
        .char-mouth { position: absolute; bottom: -5px; left: 11px; width: 8px; height: 4px; background: #2d3748; border-radius: 0 0 10px 10px; transition: all 0.2s; }
        .char-body { width: 70px; height: 65px; border-radius: 24px 24px 10px 10px; position: absolute; bottom: 5px; left: 15px; z-index: 2; transition: all 0.3s; }
        .char-body.body-blue { background: #3182ce; } .char-body.body-red { background: #e53e3e; } .char-body.body-green { background: #38a169; } .char-body.body-purple { background: #805ad5; }
        .sweat-drop { position: absolute; top: 15px; right: 15px; width: 8px; height: 12px; background: #63b3ed; border-radius: 0 80% 80% 80%; transform: rotate(45deg); opacity: 0; }

        @keyframes avatar-listening { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        @keyframes avatar-thinking { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-8deg); } }
        @keyframes avatar-impatience { 0%, 100% { transform: translateY(0); } 20%, 60% { transform: translateY(-3px); } 40%, 80% { transform: translateY(0); } }
        @keyframes sweat-drip { 0% { opacity: 0; transform: translateY(0) rotate(45deg); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(15px) rotate(45deg); } }

        .character-avatar.listening { animation: avatar-listening 3s infinite ease-in-out; }
        .character-avatar.thinking .char-head { animation: avatar-thinking 2s infinite ease-in-out; }
        .character-avatar.impatience { animation: avatar-impatience 0.8s infinite linear; }
        .character-avatar.impatience .sweat-drop { animation: sweat-drip 1.2s infinite ease-in; }
        .character-avatar.thinking .char-mouth { width: 10px; height: 2px; border-radius: 0; bottom: -2px; }
        .character-avatar.impatience .char-eye { height: 2px; border-radius: 0; margin-top: 2px; }
        .character-avatar.impatience .char-mouth { width: 12px; height: 6px; border-radius: 6px 6px 0 0; background: transparent; border-top: 3px solid #2d3748; bottom: -5px; }

        .btn-prime { width: 100%; padding: 18px; background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%); border: none; border-radius: 16px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: auto; }
        .btn-prime:active { transform: scale(0.96); }

        .game-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .score-display { font-size: 20px; font-weight: 800; color: var(--primary); transition: transform 0.2s; }
        .score-display.bump { transform: scale(1.2); color: var(--success); }
        .level-badge { padding: 6px 14px; background: rgba(155, 93, 229, 0.15); border: 1.5px solid rgba(155, 93, 229, 0.3); border-radius: 20px; font-size: 13px; font-weight: 700; color: #7b2cbf; }
        .lives-container { display: flex; gap: 4px; }
        .heart-icon { font-size: 18px; color: var(--danger); transition: all 0.3s; }
        .heart-icon.lost { color: #cbd5e0; transform: scale(0.8); }

        .audio-control-center { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px 0; gap: 12px; }
        .btn-audio-listen { width: 90px; height: 90px; border-radius: 50%; background: white; border: 2px solid rgba(255,255,255,0.6); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; }
        .btn-audio-listen:active { transform: scale(0.92); }
        .btn-audio-listen svg { width: 36px; height: 36px; fill: var(--primary); }
        .btn-audio-listen.playing { background: var(--primary); box-shadow: 0 0 0 10px rgba(74, 144, 226, 0.2); }
        .btn-audio-listen.playing svg { fill: white; }
        .voice-indicator { font-size: 12px; font-weight: 600; color: var(--text-muted); }

        .words-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: auto; margin-bottom: 20px; }
        .btn-word-option { background: rgba(255, 255, 255, 0.65); border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 18px; padding: 22px; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; }
        .btn-word-option:active { transform: scale(0.97); }
        .btn-word-option.correct-flash { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .btn-word-option.wrong-flash { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        @keyframes shake-screen { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px) rotate(-1deg); } 40%, 80% { transform: translateX(8px) rotate(1deg); } }
        .phone-container.shake { animation: shake-screen 0.3s cubic-bezier(.36,.07,.19,.97) both; border: 2px solid var(--danger); }

        .floating-score-effect { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: 900; pointer-events: none; opacity: 0; z-index: 100; transition: all 0.5s ease-out; }
        .floating-score-effect.trigger { opacity: 1; transform: translate(-50%, -90%); }

        /* 레벨 클리어 안내 패널 */
        .level-clear-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .level-clear-panel.active { opacity: 1; pointer-events: auto; }
        .level-clear-title { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }

        .rank-box-wrapper { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .rank-item { background: rgba(255, 255, 255, 0.45); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 16px; padding: 14px 18px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .rank-main-line { display: flex; justify-content: space-between; align-items: center; }
        .rank-num { font-size: 16px; font-weight: 800; min-width: 50px; }
        .rank-name { font-size: 15px; font-weight: 700; }
        .rank-score { font-size: 16px; font-weight: 800; color: var(--primary); }
        .btn-others-toggle { font-size: 11px; color: var(--primary); background: rgba(74, 144, 226, 0.12); border: none; padding: 4px 8px; border-radius: 6px; margin-left: 6px; cursor: pointer; }
        .rank-others-list { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.08); display: none; flex-direction: column; gap: 6px; }
        .rank-others-list.open { display: flex; }
        .sub-rank-user { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="phone-container" id="phoneContainer">
        <div class="floating-score-effect" id="floatingScore"></div>

        <!-- 레벨 클리어 팝업 -->
        <div class="level-clear-panel" id="levelClearPanel">
            <div class="level-clear-title" id="levelClearTitle">레벨 클리어!</div>
            <p style="color: var(--text-muted); margin-bottom: 20px;">다음 단계로 진급합니다.</p>
            <button class="btn-prime" style="width: 200px;" onclick="proceedToNextLevel()">계속하기</button>
        </div>

        <div class="screen active" id="screenIntro">
            <h1>K-Listen Master</h1>
            <p class="subtitle">한국어 발음 듣기 챌린지</p>
            <div class="avatar-preview-box">
                <div class="character-avatar listening">
                    <div class="sweat-drop"></div>
                    <div class="char-head hair-1" id="avatarHair">
                        <div class="char-glasses" id="avatarGlasses"></div>
                        <div class="char-face"><div class="char-eye"></div><div class="char-eye"></div><div class="char-mouth"></div></div>
                    </div>
                    <div class="char-body body-blue" id="avatarBody"></div>
                </div>
            </div>
            <div class="glass-card">
                <div class="input-group">
                    <label>학습자 이름 등록</label>
                    <input type="text" id="inputName" placeholder="영어, 한국어, 숫자 조합만 가능" maxlength="10">
                </div>
                <div class="customizer-title">헤어 스타일</div>
                <div class="option-row" id="hairOptions">
                    <button class="option-btn active" data-val="hair-1">차분한 숏컷</button>
                    <button class="option-btn" data-val="hair-2">귀여운 양갈래</button>
                    <button class="option-btn" data-val="hair-3">개성있는 크롭</button>
                </div>
                <div class="customizer-title">안경</div>
                <div class="option-row" id="glassesOptions">
                    <button class="option-btn active" data-val="none">착용 안 함</button>
                    <button class="option-btn" data-val="glasses-round">동글 안경</button>
                    <button class="option-btn" data-val="glasses-square">네모 안경</button>
                </div>
                <div class="customizer-title">의상 컬렉션</div>
                <div class="option-row" id="bodyOptions">
                    <button class="option-btn active" data-val="body-blue">클래식 블루</button>
                    <button class="option-btn" data-val="body-red">정열의 레드</button>
                    <button class="option-btn" data-val="body-green">내추럴 그린</button>
                    <button class="option-btn" data-val="body-purple">스마트 퍼플</button>
                </div>
            </div>
            <button class="btn-prime" id="btnStartGame">챌린지 시작하기</button>
        </div>

        <div class="screen" id="screenGame">
            <div class="game-top-bar">
                <div class="score-display" id="gameScoreDisplay">내 점수: 0</div>
                <div class="level-badge" id="gameLevelBadge">레벨 1</div>
                <div class="lives-container" id="livesContainer">
                    <span class="heart-icon">♥</span><span class="heart-icon">♥</span><span class="heart-icon">♥</span>
                </div>
            </div>
            <div class="avatar-preview-box" style="margin-bottom: 10px;">
                <div class="character-avatar listening" id="gameAvatar">
                    <div class="sweat-drop"></div>
                    <div class="char-head hair-1" id="gameAvatarHair">
                        <div class="char-glasses" id="gameAvatarGlasses"></div>
                        <div class="char-face"><div class="char-eye"></div><div class="char-eye"></div><div class="char-mouth"></div></div>
                    </div>
                    <div class="char-body body-blue" id="gameAvatarBody"></div>
                </div>
            </div>
            <div class="audio-control-center">
                <button class="btn-audio-listen" id="btnAudioPlay">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <div class="voice-indicator" id="voiceIndicator">버튼을 눌러 소리를 들으세요</div>
            </div>
            <div class="words-grid" id="wordsGrid"></div>
        </div>

        <div class="screen" id="screenResult">
            <h1 id="resultTitle">게임 종료</h1>
            <p class="subtitle" id="resultSubtitle">최종 순위를 확인하세요.</p>
            <div class="glass-card" style="text-align: center; padding: 24px 10px; margin-bottom: 16px;">
                <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 4px;">최종 마스터 스코어</div>
                <div id="finalScoreDisplay" style="font-size: 36px; font-weight: 900; color: var(--primary);">0 점</div>
            </div>
            <div class="customizer-title">🔥 명예의 전당 (실시간 명단)</div>
            <div class="rank-box-wrapper" id="rankBoxWrapper"></div>
            <button class="btn-prime" id="btnRestart">다시 도전하기</button>
        </div>
    </div>

    <script>
        // --- 사운드 엔지니어링 (Web Audio API) ---
        // 배경음악 없이 웹 브라우저 자체 합성음으로 깔끔한 효과음만 생성
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                // 정답: 경쾌한 고음 (딩동댕 느낌)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                // 오답: 둔탁한 저음 (띡- 느낌)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // 데이터 및 상태
        const GAME_LEVELS = {
            1: { name: "레벨 1 (모음)", pairs: [['아이', '오이'], ['구두', '구도'], ['물', '말']] },
            2: { name: "레벨 2 (받침)", pairs: [['산', '상', '삼'], ['발', '밥', '방'], ['문', '물']] },
            3: { name: "레벨 3 (자음)", pairs: [['달', '딸', '탈'], ['불', '뿔', '풀'], ['방', '빵']] },
            4: { name: "레벨 4 (연음)", pairs: [['얼음', '어른'], ['직업', '지갑'], ['단어', '다녀']] }
        };

        let appState = {
            user: { name: '', hair: 'hair-1', glasses: 'none', body: 'body-blue' },
            score: 0, lives: 3, currentLevel: 1, currentPairIndex: 0,
            shuffledPairsOrder: [], correctTargetWord: '', voiceTurn: 'female',
            listenCountThisRound: 0, lastActionTime: Date.now(), avatarTimer: null, isAudioPlaying: false
        };

        const synth = window.speechSynthesis;
        const els = {
            phoneContainer: document.getElementById('phoneContainer'), floatingScore: document.getElementById('floatingScore'),
            screenIntro: document.getElementById('screenIntro'), screenGame: document.getElementById('screenGame'), screenResult: document.getElementById('screenResult'),
            inputName: document.getElementById('inputName'), btnStartGame: document.getElementById('btnStartGame'),
            gameScoreDisplay: document.getElementById('gameScoreDisplay'), gameLevelBadge: document.getElementById('gameLevelBadge'), livesContainer: document.getElementById('livesContainer'),
            gameAvatar: document.getElementById('gameAvatar'), btnAudioPlay: document.getElementById('btnAudioPlay'), voiceIndicator: document.getElementById('voiceIndicator'), wordsGrid: document.getElementById('wordsGrid'),
            levelClearPanel: document.getElementById('levelClearPanel'), levelClearTitle: document.getElementById('levelClearTitle')
        };

        // 초기화
        document.querySelectorAll('.option-row').forEach(row => {
            row.addEventListener('click', e => {
                const btn = e.target.closest('.option-btn');
                if(!btn) return;
                row.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const key = row.id.replace('Options', '');
                appState.user[key] = btn.dataset.val;
                document.getElementById(`avatar${key.charAt(0).toUpperCase() + key.slice(1)}`).className = `char-${key==='hair'?'head':key==='glasses'?'glasses':'body'} ${btn.dataset.val}`;
            });
        });

        els.inputName.addEventListener('input', e => e.target.value = e.target.value.replace(/[^a-zA-Z0-9가-힣ㄱ-ㅎㅏ-ㅣ\s]/g, ''));
        els.btnStartGame.addEventListener('click', () => {
            if(!els.inputName.value.trim()) return alert("이름을 입력해주세요.");
            appState.user.name = els.inputName.value.trim();
            document.getElementById('gameAvatarHair').className = `char-head ${appState.user.hair}`;
            document.getElementById('gameAvatarGlasses').className = `char-glasses ${appState.user.glasses}`;
            document.getElementById('gameAvatarBody').className = `char-body ${appState.user.body}`;
            appState.score = 0; appState.lives = 3;
            switchScreen(els.screenIntro, els.screenGame);
            startLevel(1);
        });

        els.btnAudioPlay.addEventListener('click', () => {
            if(appState.isAudioPlaying) return;
            appState.isAudioPlaying = true;
            resetAvatarState();
            appState.listenCountThisRound++;
            if(appState.listenCountThisRound > 1) modifyScore(-20, "반복 청취 (-20)", false);
            
            els.btnAudioPlay.classList.add('playing');
            els.voiceIndicator.innerText = `${appState.voiceTurn === 'female' ? '👩 여성' : '👨 남성'} 성우 발음 재생 중...`;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(appState.correctTargetWord);
                utterance.lang = 'ko-KR';
                utterance.pitch = appState.voiceTurn === 'female' ? 1.2 : 0.75;
                utterance.rate = 0.95;
                utterance.onend = utterance.onerror = () => {
                    appState.isAudioPlaying = false;
                    els.btnAudioPlay.classList.remove('playing');
                    els.voiceIndicator.innerText = `단어를 골라주세요`;
                    appState.voiceTurn = appState.voiceTurn === 'female' ? 'male' : 'female';
                };
                synth.speak(utterance);
            } else { setTimeout(() => appState.isAudioPlaying = false, 1000); }
        });

        function switchScreen(from, to) { from.classList.remove('active'); to.classList.add('active'); }
        function startLevel(num) {
            appState.currentLevel = num; appState.currentPairIndex = 0;
            appState.shuffledPairsOrder = [...GAME_LEVELS[num].pairs].sort(() => Math.random() - 0.5);
            els.gameLevelBadge.innerText = GAME_LEVELS[num].name;
            updateStatus(); loadRound(); startAvatarTimer();
        }

        function loadRound() {
            resetAvatarState();
            appState.listenCountThisRound = 0; appState.voiceTurn = 'female';
            els.voiceIndicator.innerText = "버튼을 눌러 소리를 들으세요";
            const pair = appState.shuffledPairsOrder[appState.currentPairIndex];
            appState.correctTargetWord = pair[Math.floor(Math.random() * pair.length)];
            
            els.wordsGrid.innerHTML = '';
            [...pair].sort(() => Math.random() - 0.5).forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'btn-word-option'; btn.innerText = word;
                btn.onclick = () => handleSelect(word, btn);
                els.wordsGrid.appendChild(btn);
            });
        }

        function handleSelect(word, btn) {
            if(appState.isAudioPlaying) return;
            els.wordsGrid.querySelectorAll('button').forEach(b => b.style.pointerEvents = 'none');
            
            if(word === appState.correctTargetWord) {
                btn.classList.add('correct-flash');
                playSfx('correct'); // 정답 효과음 재생
                modifyScore(100, "+100", true);
                setTimeout(advanceRound, 800);
            } else {
                btn.classList.add('wrong-flash');
                playSfx('wrong'); // 오답 효과음 재생
                triggerHapticAndShake(); // 진동 및 흔들림 호출
                modifyScore(-100, "-100", false);
                appState.lives--; updateStatus();
                setTimeout(() => {
                    els.phoneContainer.classList.remove('shake');
                    if(appState.lives <= 0) endGame(false);
                    else { els.wordsGrid.querySelectorAll('button').forEach(b => b.style.pointerEvents = 'auto'); resetAvatarState(); }
                }, 800);
            }
        }

        // 기기 진동 및 화면 흔들림 제어
        function triggerHapticAndShake() {
            els.phoneContainer.classList.add('shake');
            if (navigator.vibrate) {
                // 모바일 기기에서 짧게 두 번 징징 울림
                navigator.vibrate([150, 50, 150]); 
            }
        }

        function advanceRound() {
            appState.currentPairIndex++;
            if(appState.currentPairIndex >= appState.shuffledPairsOrder.length) {
                if(appState.currentLevel < 4) {
                    // 레벨 클리어 시 파티클 축하 효과
                    els.levelClearTitle.innerText = `레벨 ${appState.currentLevel} 클리어!`;
                    els.levelClearPanel.classList.add('active');
                    triggerConfetti();
                } else endGame(true);
            } else loadRound();
        }

        window.proceedToNextLevel = function() {
            els.levelClearPanel.classList.remove('active');
            startLevel(appState.currentLevel + 1);
        }

        // 축하 파티클 로직 (Canvas Confetti)
        function triggerConfetti() {
            var duration = 2000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#4a90e2', '#9b5de5', '#48bb78'] });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#4a90e2', '#9b5de5', '#48bb78'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function modifyScore(amt, txt, isPositive) {
            appState.score = Math.max(0, appState.score + amt);
            els.gameScoreDisplay.innerText = `내 점수: ${appState.score}`;
            if(isPositive) {
                els.gameScoreDisplay.classList.add('bump');
                setTimeout(() => els.gameScoreDisplay.classList.remove('bump'), 200);
            }
            els.floatingScore.innerText = txt;
            els.floatingScore.style.color = isPositive ? '#48bb78' : '#f56565';
            els.floatingScore.classList.add('trigger');
            setTimeout(() => els.floatingScore.classList.remove('trigger'), 600);
        }

        function updateStatus() {
            els.gameScoreDisplay.innerText = `내 점수: ${appState.score}`;
            els.livesContainer.querySelectorAll('.heart-icon').forEach((h, i) => h.classList.toggle('lost', i >= appState.lives));
        }

        function startAvatarTimer() {
            if(appState.avatarTimer) clearInterval(appState.avatarTimer);
            appState.avatarTimer = setInterval(() => {
                if(appState.isAudioPlaying) return;
                const e = Date.now() - appState.lastActionTime;
                els.gameAvatar.className = `character-avatar ${e>=10000?'impatience':e>=5000?'thinking':'listening'}`;
            }, 1000);
        }
        function resetAvatarState() { appState.lastActionTime = Date.now(); els.gameAvatar.className = 'character-avatar listening'; }

        function endGame(isClear) {
            clearInterval(appState.avatarTimer); switchScreen(els.screenGame, els.screenResult);
            document.getElementById('resultTitle').innerText = isClear ? "🎉 올 클리어 성공!" : "💀 게임 오버";
            document.getElementById('finalScoreDisplay').innerText = `${appState.score} 점`;
            
            let ranks = JSON.parse(localStorage.getItem('kListenRanking')) || [];
            ranks.push({name: appState.user.name, score: appState.score, date: Date.now()});
            ranks.sort((a,b) => b.score!==a.score ? b.score-a.score : b.date-a.date).splice(15);
            localStorage.setItem('kListenRanking', JSON.stringify(ranks));
            
            const wrapper = document.getElementById('rankBoxWrapper'); wrapper.innerHTML = '';
            let currentRank = 1, i = 0;
            while(i < ranks.length) {
                const score = ranks[i].score;
                const group = ranks.filter(r => r.score === score);
                const leader = group[0];
                const count = group.length;
                
                let btnHtml = count > 1 ? `<button class="btn-others-toggle" onclick="this.nextElementSibling.classList.toggle('open'); this.innerText=this.innerText.includes('닫기')?'그 외 ${count-1}명':'닫기'">그 외 ${count-1}명</button>` : '';
                let listHtml = count > 1 ? `<div class="rank-others-list">${group.map((u,idx)=>`<div class="sub-rank-user"><span>${idx+1}. ${u.name} ${u.name===appState.user.name?'<b>(나)</b>':''}</span><span>${new Date(u.date).toLocaleDateString()}</span></div>`).join('')}</div>` : '';
                
                wrapper.innerHTML += `<div class="rank-item"><div class="rank-main-line"><div class="rank-badge-info"><span class="rank-num">${count>1?'공동 ':''}${currentRank}등</span><span class="rank-name">${leader.name} ${leader.name===appState.user.name?'<span style="color:var(--primary); font-size:12px;">(나)</span>':''}</span></div><span class="rank-score">${score} P</span></div>${btnHtml}${listHtml}</div>`;
                currentRank += count; i += count;
            }
        }
        document.getElementById('btnRestart').onclick = () => { resetAvatarState(); switchScreen(els.screenResult, els.screenIntro); };
    </script>
</body>
</html>
